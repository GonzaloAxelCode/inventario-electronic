<main tuiNavigationMain>
  <header tuiSubheader>
    <div class="flex gap-4 items-center">
      <h2 tuiHeader>
        <div tuiTitle>
          <div tuiNavigationLogo>
            <tui-icon icon="@tui.gitlab" />
            <span tuiFade>Gestión de Inventario</span>
          </div>
        </div>
      </h2>
    </div>

    <!-- PESTAÑAS SIN ROUTER -->
    <nav tuiTabs class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">
      <button tuiTab (click)="setTab('inventario')" 
        [class.active-link]="activeTab === 'inventario'">
        Inventario
      </button>
      <button tuiTab (click)="setTab('proveedor')" 
        [class.active-link]="activeTab === 'proveedor'">
        Proveedores
      </button>
    </nav>
  </header>

  <div>
    <div class="py-4">

      <!-- TAB: INVENTARIO -->
      <ng-container *ngIf="activeTab === 'inventario'">
        <div class="flex gap-2 pb-4">
          <button iconStart="@tui.plus" tuiButton appearance="textfield" tuiButtonVertical type="button"
            (click)="showDialog()">
            Crear Inventario
          </button>
        </div>

        <app-tableinventario mode="normal"></app-tableinventario>
      </ng-container>

      <!-- TAB: PROVEEDORES -->
      <ng-container *ngIf="activeTab === 'proveedor'">
        <app-tableproveedor></app-tableproveedor>
      </ng-container>

    </div>
  </div>
</main>
