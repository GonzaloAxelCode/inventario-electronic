<main tuiNavigationMain>
  <header tuiSubheader>
    <div class="flex gap-4 pt-4 items-center">
      <h2 tuiHeader>
        <div tuiTitle>
          <div tuiNavigationLogo>
            <tui-icon icon="@tui.gitlab" />
            <span tuiFade>Gestion de Pedidos</span>
          </div>
        </div>
      </h2>
    </div>

    <nav tuiTabs [(activeItemIndex)]="activeTabIndex" (activeItemIndexChange)="onTabChange($event)"
      class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">

      <button tuiTab type="button">
        Historial de Pedidos
      </button>

      <button tuiTab type="button">
        Crear Pedido
      </button>

    </nav>
  </header>
  <div class="py-2">

    <!-- TAB: HISTORIAL DE PEDIDOS -->
    <ng-container *ngIf="activeTab === 'historial'">
      <app-listallpedidos></app-listallpedidos>
    </ng-container>

    <!-- TAB: CREAR PEDIDO -->
    <ng-container *ngIf="activeTab === 'crear'">
      <app-registrarpedido></app-registrarpedido>
    </ng-container>

  </div>
</main>
