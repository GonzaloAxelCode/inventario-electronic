<main tuiNavigationMain>
  <header tuiSubheader>
    <div class="flex gap-4 pt-4 items-center">
      <h2 tuiHeader>
        <div tuiTitle>
          <div tuiNavigationLogo>
            <tui-icon icon="@tui.gitlab" />
            <span tuiFade>Gestion de Compras</span>
          </div>
        </div>
      </h2>
    </div>

    <nav tuiTabs [(activeItemIndex)]="activeTabIndex" (activeItemIndexChange)="onTabChange($event)"
      class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">

      <button tuiTab type="button">
        Historial de Compras
      </button>

      <button tuiTab type="button">
        Registrar Comprobantes
      </button>

      <button tuiTab type="button">
        Subir por archivo Excel
      </button>

    </nav>
  </header>
  <div class="py-2">

    <!-- TAB: HISTORIAL DE COMPRAS -->
    <ng-container *ngIf="activeTab === 'historial'">
      <app-listallcompras></app-listallcompras>
    </ng-container>

    <!-- TAB: REGISTRAR COMPROBANTES -->
    <ng-container *ngIf="activeTab === 'comprobantes'">
      <app-registrarcompra></app-registrarcompra>
    </ng-container>

    <!-- TAB: SUBIR EXCEL -->
    <ng-container *ngIf="activeTab === 'excel'">
      <app-subirexcel></app-subirexcel>
    </ng-container>

  </div>
</main>
