<main tuiNavigationMain>
    <header tuiSubheader>
        <div class="flex gap-4 items-center">
            <h2 tuiHeader>
                <div tuiTitle>
                    <div tuiNavigationLogo>
                        <tui-icon icon="@tui.gitlab" />
                        <span tuiFade>Gestion de Productos</span>
                    </div>


                </div>
            </h2>
        </div>




        <!-- PESTAÑAS SIN ROUTER -->
        <nav tuiTabs [(activeItemIndex)]="activeTabIndex" (activeItemIndexChange)="onTabChange($event)"
            class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">

            <button tuiTab type="button">
                Productos
            </button>

            <button tuiTab type="button">
                Categorías
            </button>

            <button tuiTab type="button">
                Gráficos
            </button>

            <button tuiTab type="button">
                Alertas de Stock
            </button>

            <button tuiTab type="button">
                Agregar productos por Excel
            </button>

        </nav>


    </header>


    <div>
        <div class="py-4">
            <!-- TAB: PRODUCTOS -->
            <ng-container *ngIf="activeTab === 'productos'">
                <div class="flex gap-2 pb-4">
                    <button iconStart="@tui.plus" tuiButton appearance="textfield" tuiButtonVertical type="button"
                        (click)="showDialogCreateProduct()">
                        Agregar nuevo producto
                    </button>

                    <app-buttonupdate [func]="clickRefreshProducts.bind(this)" [loading]="loading"></app-buttonupdate>
                </div>

                <app-tableproduct></app-tableproduct>
            </ng-container>


            <!-- TAB: CATEGORÍAS -->
            <ng-container *ngIf="activeTab === 'categorias'">
                <div class="flex gap-2 py-4">
                    <button iconStart="@tui.plus" tuiButton appearance="textfield" tuiButtonVertical type="button"
                        (click)="showDialogCreateCategoria()">
                        Agregar categoria
                    </button>
                </div>

                <app-tablecategories></app-tablecategories>
            </ng-container>

            <ng-container *ngIf="activeTab === 'graficos'">
                <app-graficos-productos></app-graficos-productos>
            </ng-container>

                 

                  <ng-container *ngIf="activeTab === 'alertas'">
                    <app-alertas-stock></app-alertas-stock>
            </ng-container>

            <ng-container *ngIf="activeTab === 'excel'">
                <app-subircsvproductos></app-subircsvproductos>
            </ng-container>




        </div>
    </div>

</main>
