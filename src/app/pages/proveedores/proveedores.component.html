<main tuiNavigationMain>
  <header tuiSubheader>
    <div class="flex gap-4 pt-4 items-center">
      <h2 tuiHeader>
        <div tuiTitle>
          <div tuiNavigationLogo>
            <tui-icon icon="@tui.gitlab" />
            <span tuiFade>Gestion de Proveedores</span>
          </div>
        </div>
      </h2>
    </div>

    <nav tuiTabs [(activeItemIndex)]="activeTabIndex" (activeItemIndexChange)="onTabChange($event)"
      class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">

      <button tuiTab type="button">
        Listado de Proveedores
      </button>

      <button tuiTab type="button">
        Registrar Proveedor
      </button>

    </nav>
  </header>
  <div class="py-2">

    <!-- TAB: LISTADO DE PROVEEDORES -->
    <ng-container *ngIf="activeTab === 'listado'">
      <app-listallproveedores></app-listallproveedores>
    </ng-container>

    <!-- TAB: REGISTRAR PROVEEDOR -->
    <ng-container *ngIf="activeTab === 'registrar'">
      <app-registrarproveedor></app-registrarproveedor>
    </ng-container>

  </div>
</main>
