<main tuiNavigationMain>
  <header tuiSubheader>
    <div class="flex gap-4 pt-4 items-center">
      <h2 tuiHeader>
        <div tuiTitle>
          <div tuiNavigationLogo>
            <tui-icon icon="@tui.gitlab" />
            <span tuiFade>Guías de Remisión</span>
          </div>
        </div>
      </h2>
    </div>

    <nav tuiTabs [(activeItemIndex)]="activeTabIndex" (activeItemIndexChange)="onTabChange($event)"
      class="flex gap-2 overflow-x-auto whitespace-nowrap py-2 px-1">

      <button tuiTab type="button">
        Guías Registradas
      </button>

      <button tuiTab type="button">
        Nueva Guía
      </button>

    </nav>
  </header>

  <div class="py-2">

    <!-- TAB: LISTA DE GUÍAS -->
    <ng-container *ngIf="activeTab === 'lista' && !guiaSeleccionada">
      <app-listaguias (verDetalle)="onVerDetalle($event)" (editarGuia)="onEditarGuia($event)">
      </app-listaguias>
    </ng-container>

    <!-- TAB: DETALLE DE GUÍA -->
    <ng-container *ngIf="activeTab === 'lista' && guiaSeleccionada">
      <app-detalleguia [guia]="guiaSeleccionada" (cerrar)="onCerrarDetalle()">
      </app-detalleguia>
    </ng-container>

    <!-- TAB: REGISTRAR NUEVA GUÍA -->
    <ng-container *ngIf="activeTab === 'registrar'">
      <app-formguia (cancelar)="onCancelarForm()">
      </app-formguia>
    </ng-container>

  </div>
</main>
