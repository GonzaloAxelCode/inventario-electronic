<div class="flex flex-col p-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-4 shrink-0">
    <h2 class="text-lg font-bold text-neutral-900 dark:text-white">Subir archivos CSV</h2>
    <label class="cursor-pointer">
      <input #fileInputTop type="file" accept=".csv" multiple class="hidden" (change)="onFilesSelected($event)" />
      <span class="inline-flex items-center gap-2 px-4 py-2 bg-black dark:bg-white text-white dark:text-black rounded-lg text-sm font-semibold hover:opacity-90 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
        </svg>
        Subir archivos
      </span>
    </label>
  </div>

  <!-- Estado vacio -->
  <div *ngIf="csvFiles.length === 0"
    class="flex-1 flex flex-col items-center justify-center text-neutral-400 dark:text-neutral-300 rounded-xl bg-neutral-50 dark:bg-neutral-800 border-2 border-dashed border-neutral-300 dark:border-neutral-700 cursor-pointer"
    (click)="fileInput.click()" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
    <input #fileInput type="file" accept=".csv" multiple class="hidden" (change)="onFilesSelected($event)" />
    <img class="pb-3 w-20 h-20 object-contain mx-auto opacity-60"
      src="https://cdn-icons-png.flaticon.com/512/10951/10951882.png" alt="Sin archivos">
    <p class="text-base font-bold mb-1">Sin archivos CSV</p>
    <p class="text-xs text-neutral-500 dark:text-neutral-400">
      Arrastra archivos aqui o haz clic para seleccionar
    </p>
  </div>

  <!-- Grid de archivos tipo Google Drive -->
  <div *ngIf="csvFiles.length > 0" class="flex-1 overflow-y-auto"
    (dragover)="onDragOver($event)" (drop)="onDrop($event)">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">

      <div *ngFor="let csv of csvFiles; trackBy: trackById"
        class="relative bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 hover:shadow-md transition-all group">

        <!-- Boton quitar -->
        <button (click)="removeFile(csv.id); $event.stopPropagation()"
          class="absolute -top-2 -right-2 z-10 w-6 h-6 bg-red-500 text-white rounded-full text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center hover:bg-red-600">
          X
        </button>

        <!-- Preview de contenido -->
        <div class="p-3">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-8 h-8 text-green-600 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <div class="min-w-0 flex-1">
              <p class="text-sm font-semibold text-neutral-900 dark:text-white truncate">{{ csv.name }}</p>
              <p class="text-[10px] text-neutral-500 dark:text-neutral-400">{{ csv.size }} - {{ csv.rows }} filas</p>
            </div>
          </div>

          <!-- Mini preview de la tabla -->
          <div *ngIf="csv.preview.length > 0" class="overflow-hidden rounded-lg border border-neutral-200 dark:border-neutral-600">
            <table class="w-full text-[9px]">
              <tr *ngFor="let row of csv.preview; let isFirst = first"
                [class]="isFirst ? 'bg-neutral-100 dark:bg-neutral-700 font-bold' : 'bg-white dark:bg-neutral-800'">
                <td *ngFor="let cell of row" class="px-1.5 py-0.5 border-r border-neutral-200 dark:border-neutral-600 truncate max-w-[80px]">
                  {{ cell }}
                </td>
              </tr>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
