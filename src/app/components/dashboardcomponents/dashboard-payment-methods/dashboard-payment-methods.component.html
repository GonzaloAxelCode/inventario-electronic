<div class="flex flex-col gap-3">
  <div class="flex flex-wrap gap-2">
    <tui-select
      (ngModelChange)="onMonthChange($event)"
      tuiTextfieldSize="s"
      [ngModel]="selectedMonthName"
      name="month"
      class="w-full sm:w-32">
      <tui-data-list-wrapper
        *tuiDataList
        [items]="monthNames">
      </tui-data-list-wrapper>
    </tui-select>
    <tui-select
      (ngModelChange)="onYearChange($event)"
      tuiTextfieldSize="s"
      [ngModel]="selectedYear"
      name="year"
      class="w-full sm:w-20">
      <tui-data-list-wrapper
        *tuiDataList
        [items]="yearNumbers">
      </tui-data-list-wrapper>
    </tui-select>
  </div>

  <div *ngIf="loading; else loadedContent">
    <div class="flex items-center gap-4">
      <div class="w-28 h-28 rounded-full bg-neutral-100 dark:bg-neutral-700 animate-pulse shrink-0"></div>
      <div class="space-y-2 flex-1">
        <div class="flex items-center gap-2" *ngFor="let i of [1, 2, 3]">
          <div class="w-3 h-3 rounded-full bg-neutral-200 dark:bg-neutral-600 animate-pulse"></div>
          <div class="h-3 flex-1 bg-neutral-200 dark:bg-neutral-600 rounded animate-pulse"></div>
          <div class="h-3 w-8 bg-neutral-200 dark:bg-neutral-600 rounded animate-pulse"></div>
        </div>
      </div>
    </div>
  </div>
  <ng-template #loadedContent>
    <div *ngIf="ringValue.length > 0; else emptyState" class="chart-wrapper">
      <tui-ring-chart
        [value]="ringValue"
        [(activeItemIndex)]="activeItemIndex">
        <div class="text-center">
          <p class="text-lg font-extrabold text-neutral-900 dark:text-white">{{ totalVentas }}</p>
          <p class="text-[10px] text-neutral-500">ventas</p>
        </div>
      </tui-ring-chart>

      <div class="chart-legend">
        <tui-legend-item
          *ngFor="let label of ringLabels; let index = index"
          size="s"
          class="legend-item"
          [active]="isRingActive(index)"
          [color]="getColor(index)"
          [text]="label"
          (tuiHoveredChange)="onRingHover(index, $event)">
          <span>{{ ringValue[index] }}</span>
        </tui-legend-item>
      </div>
    </div>
  </ng-template>
  <ng-template #emptyState>
    <div class="flex items-center justify-center h-28 text-neutral-400 text-sm">
      No hay datos de métodos de pago
    </div>
  </ng-template>
</div>
