<section>
  <div class="grid grid-cols-1 w-full gap-2 mb-4 rounded-lg" [tuiSkeleton]="!!(selectVentas$ | async)?.loadingMostSales">
    <div class="col-span-5">
      <tui-input-date-range (ngModelChange)="onRangeChange($event)" [maxLength]="maxLength" [ngModel]="range">
        Rango de fechas
      </tui-input-date-range>
    </div>
  </div>

  <div class="rounded-lg" [tuiSkeleton]="!!(selectVentas$ | async)?.loadingMostSales">
    <ng-container *ngIf="{
      labels: labels$ | async,
      values: value$ | async
    } as data">
      <tui-axes
        *ngIf="data.labels && data.values"
        class="axes"
        [axisXLabels]="data.labels"
        [horizontalLines]="4"
        [verticalLines]="data.labels.length - 1"
      >
        <tui-line-days-chart
          class="chart"
          [height]="2100"
          [value]="data.values"
          [xStringify]="xStringify$ | async"
          [yStringify]="yStringify"
        />
      </tui-axes>
    </ng-container>
  </div>
</section>
