<ng-template #sidebarTemplate>
  <nav class="sidebar-nav bg-white dark:bg-neutral-800 border-r border-neutral-200 dark:border-neutral-700">

    <!-- Logo -->
    <div class="sidebar-logo border-b border-neutral-200 dark:border-neutral-700">
      <a routerLink="/admin" (click)="onClose()" class="logo-link">
        <img
          [src]="tienda.logo_img ? tienda.logo_img : 'https://res.cloudinary.com/ddksrkond/image/upload/c_crop,w_500,h_210,g_auto/v1764500497/logofinal_pdsf0v.png'"
          class="logo-img dark:invert" alt="Logo">
      </a>
    </div>

    <!-- Navigation Links -->
    <div class="sidebar-nav-links">
      <a routerLink="/admin" (click)="onClose()" [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="nav-link-active" class="nav-link text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-900 dark:hover:text-white">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span>Inicio</span>
      </a>

      <a routerLink="/admin/store" (click)="onClose()"
        routerLinkActive="nav-link-active" class="nav-link text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-900 dark:hover:text-white">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        <span>Tiendas</span>
      </a>

      <a routerLink="/admin/history" (click)="onClose()"
        routerLinkActive="nav-link-active" class="nav-link text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-900 dark:hover:text-white">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>Historial</span>
      </a>

      <a routerLink="/admin/config" (click)="onClose()"
        routerLinkActive="nav-link-active" class="nav-link text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-900 dark:hover:text-white">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>Configuración</span>
      </a>
    </div>

    <!-- User Menu -->
    <div class="sidebar-footer border-t border-neutral-200 dark:border-neutral-700">
      <div class="user-menu-container relative">
        <button
          (click)="toggleUserMenu(); $event.stopPropagation()"
          class="user-menu-trigger hover:bg-neutral-100 dark:hover:bg-neutral-700">
          <div class="user-avatar">
            {{ user.first_name?.charAt(0) || 'U' }}{{ user.last_name?.charAt(0) || '' }}
          </div>
          <div class="user-info">
            <span class="user-name text-neutral-900 dark:text-white">{{ user.username }}</span>
            <span class="user-role text-neutral-500 dark:text-neutral-400">Administrador</span>
          </div>
          <svg class="chevron-icon text-neutral-400" [class.rotate-180]="userMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <div *ngIf="userMenuOpen" class="user-dropdown bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700">
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              {{ user.first_name?.charAt(0) || 'U' }}{{ user.last_name?.charAt(0) || '' }}
            </div>
            <div>
              <p class="dropdown-name text-neutral-900 dark:text-white">{{ user.first_name }} {{ user.last_name }}</p>
              <p class="dropdown-email text-neutral-500 dark:text-neutral-400">{{ user.username }}</p>
            </div>
          </div>

          <div class="dropdown-divider bg-neutral-200 dark:bg-neutral-700"></div>

          <button (click)="navigateTo('/admin/config')" class="dropdown-item text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700">
            <svg class="dropdown-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Configuración
          </button>

          <button (click)="navigateTo('/app/settings/cuenta')" class="dropdown-item text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700">
            <svg class="dropdown-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            Mi Cuenta
          </button>

          <div class="dropdown-divider bg-neutral-200 dark:bg-neutral-700"></div>

          <button (click)="toggleTheme($event)" class="dropdown-item text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 active:bg-neutral-200 dark:active:bg-neutral-600 transition-colors duration-150">
            <app-darkmode></app-darkmode>
            <span>Tema</span>
          </button>

          <div class="dropdown-divider bg-neutral-200 dark:bg-neutral-700"></div>

          <button (click)="logout2()" class="dropdown-item text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30">
            <svg class="dropdown-item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </nav>
</ng-template>

<!-- Mobile Drawer -->
<div class="flex md:hidden">
  <tui-drawer *tuiPopup="open()" direction="left" class="drawer" [overlay]="true" (click.self)="onClose()">
    <aside class="relative">
      <div class="absolute right-4 top-4 z-10">
        <button class="bg-white dark:bg-neutral-900 shadow-lg" tuiButton type="button" iconStart="@tui.x" size="s"
          appearance="floating" (click)="onClose()">
        </button>
      </div>
      <ng-container *ngTemplateOutlet="sidebarTemplate"></ng-container>
    </aside>
  </tui-drawer>
</div>

<!-- Main Layout -->
<div class="relative flex h-screen w-full">
  <div class="flex w-full mx-auto">
    <!-- Desktop Sidebar -->
    <aside class="hidden md:block bg-white dark:bg-neutral-800 w-[14rem] shrink-0">
      <ng-container *ngTemplateOutlet="sidebarTemplate"></ng-container>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 relative overflow-auto h-screen bg-neutral-50 dark:bg-neutral-800">
      <app-header></app-header>
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
